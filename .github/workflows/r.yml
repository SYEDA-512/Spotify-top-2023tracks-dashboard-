name: Run R Script

on:
  push:
    branches: [ main ]

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install packages
        run: |
          Rscript -e 'install.packages(c("readxl","dplyr","ggplot2"))'

      - name: Run script
        run: |
          Rscript "final project.R"
